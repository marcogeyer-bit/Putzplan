<!DOCTYPE html>

<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Plan de Limpieza</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f4f3f1; --white: #fff; --text: #1a1a1a;
    --muted: #bbb8b3; --border: #e6e3de;
    --inactive: #d4d1cb; --inactive-bg: #f9f8f6;
    --warn: #d4622a;
    --arrival: #2a6e3f; --arrival-bg: #f0f7f3; --arrival-border: #b6d9c3;
    --departure: #1a3a6e; --departure-bg: #f0f4fa; --departure-border: #b6c8e8;
  }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; min-height: 100vh; padding-bottom: 40px; -webkit-font-smoothing: antialiased; }

/* SYNC STATUS */
.sync-bar { background: var(–arrival-bg); border-bottom: 1px solid var(–arrival-border); padding: 6px 20px; font-size: 10px; color: var(–arrival); letter-spacing: 0.06em; text-align: center; display: none; }
.sync-bar.visible { display: block; }
.sync-bar.error { background: #fff0f0; border-color: #f5b8b8; color: var(–warn); }

/* PIN */
.pin-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 500; align-items: center; justify-content: center; }
.pin-overlay.visible { display: flex; }
.pin-box { background: #fff; border-radius: 16px; padding: 28px 24px; width: 280px; text-align: center; }
.pin-title { font-size: 13px; font-weight: 500; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 20px; }
.pin-dots { display: flex; justify-content: center; gap: 12px; margin-bottom: 24px; }
.pin-dot { width: 14px; height: 14px; border-radius: 50%; border: 1.5px solid #e6e3de; background: white; }
.pin-dot.filled { background: #1a1a1a; border-color: #1a1a1a; }
.pin-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
.pin-btn { background: #f4f3f1; border: none; border-radius: 10px; height: 52px; font-family: ‘DM Sans’, sans-serif; font-size: 20px; font-weight: 300; color: #1a1a1a; cursor: pointer; -webkit-tap-highlight-color: transparent; }
.pin-btn:active { background: #e6e3de; }
.pin-btn.del { font-size: 14px; color: #bbb8b3; }
.pin-error { font-size: 11px; color: #d4622a; margin-top: 12px; min-height: 16px; }
.pin-cancel { font-size: 11px; color: #bbb8b3; margin-top: 14px; cursor: pointer; }

/* HEADER */
.header { background: #fff; border-bottom: 1px solid #e6e3de; padding: 26px 20px 18px; position: sticky; top: 0; z-index: 100; }
.top-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.wordmark { font-size: 13px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
.admin-badge { font-size: 9px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #2a6e3f; background: #f0f7f3; border: 1px solid #b6d9c3; border-radius: 4px; padding: 2px 6px; display: none; margin-left: 6px; }
.admin-badge.visible { display: inline-block; }
.controls { display: flex; align-items: center; gap: 14px; }
.reset-btn { background: none; border: none; font-family: ‘DM Sans’, sans-serif; font-size: 11px; color: #bbb8b3; cursor: pointer; padding: 0; letter-spacing: 0.04em; display: none; }
.lang-toggle { display: flex; gap: 6px; align-items: center; }
.flag-btn { border: 2px solid transparent; background: transparent; border-radius: 6px; padding: 2px; cursor: pointer; opacity: 0.4; line-height: 1; font-size: 22px; }
.flag-btn.active { border-color: #1a1a1a; opacity: 1; }
.readonly-banner { background: #fffbf0; border: 1.5px solid #e8d87a; border-radius: 8px; padding: 10px 14px; margin-bottom: 14px; font-size: 11px; color: #8a7a20; text-align: center; }

.date-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.date-card { border-radius: 8px; padding: 10px 12px; display: flex; flex-direction: column; gap: 5px; }
.date-card.arrival { background: #f0f7f3; border: 1.5px solid #b6d9c3; }
.date-card.departure { background: #f0f4fa; border: 1.5px solid #b6c8e8; }
.date-card.dimmed { opacity: 0.35; }
.date-label { font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; display: flex; align-items: center; gap: 5px; }
.date-card.arrival .date-label { color: #2a6e3f; }
.date-card.departure .date-label { color: #1a3a6e; }
.date-input { border: none; background: transparent; font-family: ‘DM Sans’, sans-serif; font-size: 13px; color: #1a1a1a; width: 100%; outline: none; padding: 0; }
.date-input:disabled { opacity: 0.5; pointer-events: none; }

.progress-row { display: flex; align-items: center; gap: 12px; }
.progress-bar { flex: 1; height: 2px; background: #e6e3de; border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: #1a1a1a; border-radius: 2px; width: 0%; }
.progress-label { font-size: 11px; color: #bbb8b3; white-space: nowrap; min-width: 36px; text-align: right; }

.content { max-width: 480px; margin: 0 auto; padding: 16px 16px 0; }

.date-banner { border-radius: 8px; padding: 12px 14px; margin-bottom: 10px; display: none; align-items: center; gap: 10px; }
.date-banner.visible { display: flex; }
.date-banner.arrival { background: #f0f7f3; border: 1.5px solid #b6d9c3; }
.date-banner.departure { background: #f0f4fa; border: 1.5px solid #b6c8e8; }
.banner-icon { font-size: 20px; flex-shrink: 0; }
.banner-text { flex: 1; }
.banner-label { font-size: 9px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 2px; }
.date-banner.arrival .banner-label { color: #2a6e3f; }
.date-banner.departure .banner-label { color: #1a3a6e; }
.banner-date { font-size: 14px; font-weight: 500; color: #1a1a1a; }
.banner-days { font-size: 11px; color: #bbb8b3; margin-top: 1px; }

.section { background: #fff; border: 1px solid #e6e3de; border-radius: 10px; margin-bottom: 10px; overflow: hidden; }
.section-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; border-bottom: 1px solid #e6e3de; }
.section.collapsed .section-header { border-bottom: none; }
.section-left { display: flex; align-items: center; gap: 8px; flex: 1; }
.section-title { font-size: 12px; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; }
.section-count { font-size: 11px; color: #bbb8b3; }
.collapse-icon { width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; color: #bbb8b3; transition: transform 0.2s; }
.section.collapsed .collapse-icon { transform: rotate(-90deg); }
.section.collapsed .section-body { display: none; }
.phase-label { font-size: 10px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: #bbb8b3; padding: 10px 16px 2px; }

.task { display: flex; align-items: flex-start; gap: 12px; padding: 11px 16px; border-bottom: 1px solid #e6e3de; cursor: pointer; -webkit-tap-highlight-color: transparent; user-select: none; }
.task:last-child { border-bottom: none; }
.task-cb { width: 18px; height: 18px; border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; }
.task-body { flex: 1; }
.task-text { font-size: 14px; line-height: 1.45; }
.task-note { display: block; font-size: 11px; margin-top: 3px; }
</style>

</head>
<body>

<div class="sync-bar" id="sync-bar">⟳ Wird synchronisiert...</div>

<div class="pin-overlay" id="pin-overlay">
  <div class="pin-box">
    <div class="pin-title">Admin PIN</div>
    <div class="pin-dots">
      <div class="pin-dot" id="d0"></div>
      <div class="pin-dot" id="d1"></div>
      <div class="pin-dot" id="d2"></div>
      <div class="pin-dot" id="d3"></div>
    </div>
    <div class="pin-grid">
      <button class="pin-btn" onclick="pinPress('1')">1</button>
      <button class="pin-btn" onclick="pinPress('2')">2</button>
      <button class="pin-btn" onclick="pinPress('3')">3</button>
      <button class="pin-btn" onclick="pinPress('4')">4</button>
      <button class="pin-btn" onclick="pinPress('5')">5</button>
      <button class="pin-btn" onclick="pinPress('6')">6</button>
      <button class="pin-btn" onclick="pinPress('7')">7</button>
      <button class="pin-btn" onclick="pinPress('8')">8</button>
      <button class="pin-btn" onclick="pinPress('9')">9</button>
      <button class="pin-btn"></button>
      <button class="pin-btn" onclick="pinPress('0')">0</button>
      <button class="pin-btn del" onclick="pinDel()">⌫</button>
    </div>
    <div class="pin-error" id="pin-error"></div>
    <div class="pin-cancel" onclick="closePin()">Abbrechen</div>
  </div>
</div>

<div class="header">
  <div class="top-row">
    <div style="display:flex;align-items:center">
      <span class="wordmark" id="wordmark" onclick="openPin()">Plan de Limpieza</span>
      <span class="admin-badge" id="admin-badge">Admin</span>
    </div>
    <div class="controls">
      <button class="reset-btn" id="reset-btn" onclick="resetAll()">Reset</button>
      <div class="lang-toggle">
        <button class="flag-btn" id="btn-de" onclick="setLang('de')">🇩🇪</button>
        <button class="flag-btn active" id="btn-es" onclick="setLang('es')">🇪🇸</button>
      </div>
    </div>
  </div>
  <div class="readonly-banner" id="readonly-banner">👁 Solo lectura</div>
  <div class="date-row">
    <div class="date-card arrival" id="card-arrival">
      <div class="date-label"><span>✈️</span><span id="lbl-arrival">Llegada</span></div>
      <input class="date-input" type="date" id="date-arrival" oninput="onDateInput('arrival')" disabled>
    </div>
    <div class="date-card departure" id="card-departure">
      <div class="date-label"><span>🧳</span><span id="lbl-departure">Salida</span></div>
      <input class="date-input" type="date" id="date-departure" oninput="onDateInput('departure')" disabled>
    </div>
  </div>
  <div class="progress-row">
    <div class="progress-bar"><div class="progress-fill" id="pf"></div></div>
    <div class="progress-label" id="pl">0 / 0</div>
  </div>
</div>

<div class="content" id="content">
  <div class="date-banner arrival" id="banner-arrival">
    <div class="banner-icon">✈️</div>
    <div class="banner-text">
      <div class="banner-label" id="banner-arrival-label">Llegada</div>
      <div class="banner-date" id="banner-arrival-date"></div>
      <div class="banner-days" id="banner-arrival-days"></div>
    </div>
  </div>
  <div class="date-banner departure" id="banner-departure">
    <div class="banner-icon">🧳</div>
    <div class="banner-text">
      <div class="banner-label" id="banner-departure-label">Salida</div>
      <div class="banner-date" id="banner-departure-date"></div>
      <div class="banner-days" id="banner-departure-days"></div>
    </div>
  </div>
</div>

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
// ── FIREBASE CONFIG ──────────────────────────────────────
var firebaseConfig = {
  apiKey: "AIzaSyCaZnNxN8_tHZpsqOsG6Lr4yXXpqBCGvmA",
  authDomain: "putzplan-fdda9.firebaseapp.com",
  databaseURL: "https://putzplan-fdda9-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "putzplan-fdda9",
  storageBucket: "putzplan-fdda9.firebasestorage.app",
  messagingSenderId: "620243489015",
  appId: "1:620243489015:web:96d10e3e49b8e5c0e4b5c3",
  measurementId: "G-MXPXQ7FT6D"
};
firebase.initializeApp(firebaseConfig);
var db = firebase.database();
var stateRef = db.ref('putzplan/state');
// ─────────────────────────────────────────────────────────

var ADMIN_PIN = '1967';
var pinEntry = '';
var isAdmin = false;
var lang = 'es';
var mode = null;
var checked = {};
var collapsed = {};
var remoteData = {}; // last known remote state

function showSync(msg, isError) {
  var bar = document.getElementById('sync-bar');
  bar.textContent = msg;
  bar.className = 'sync-bar visible' + (isError ? ' error' : '');
  clearTimeout(bar._t);
  if (!isError) {
    bar._t = setTimeout(function() { bar.classList.remove('visible'); }, 2000);
  }
}

// Save state to Firebase
function saveToFirebase() {
  if (!isAdmin) return;
  showSync('⟳ Wird gespeichert...');
  var state = {
    checked: checked,
    mode: mode,
    arrival: document.getElementById('date-arrival').value,
    departure: document.getElementById('date-departure').value,
    ts: Date.now()
  };
  stateRef.set(state, function(err) {
    if (err) showSync('⚠ Fehler beim Speichern', true);
    else showSync('✓ Gespeichert');
  });
}

// Load state from Firebase and apply
function loadFromFirebase(data) {
  if (!data) return;
  remoteData = data;

  // Apply checked state
  checked = data.checked || {};

  // Apply dates
  if (data.arrival) {
    document.getElementById('date-arrival').value = data.arrival;
    document.getElementById('card-departure').classList.add('dimmed');
    document.getElementById('card-arrival').classList.remove('dimmed');
    mode = 'arrival';
  } else if (data.departure) {
    document.getElementById('date-departure').value = data.departure;
    document.getElementById('card-arrival').classList.add('dimmed');
    document.getElementById('card-departure').classList.remove('dimmed');
    mode = 'departure';
  } else {
    mode = null;
  }

  updateBanners();
  render();
}

// Listen for real-time updates
stateRef.on('value', function(snapshot) {
  loadFromFirebase(snapshot.val());
}, function(err) {
  showSync('⚠ Keine Verbindung', true);
});

// ── PIN ──────────────────────────────────────────────────
function openPin() {
  if (isAdmin) { lockAdmin(); return; }
  pinEntry = '';
  updatePinDots();
  document.getElementById('pin-error').textContent = '';
  document.getElementById('pin-overlay').classList.add('visible');
}

function closePin() {
  pinEntry = '';
  updatePinDots();
  document.getElementById('pin-overlay').classList.remove('visible');
}

function pinPress(digit) {
  if (!digit || pinEntry.length >= 4) return;
  pinEntry += digit;
  updatePinDots();
  if (pinEntry.length === 4) {
    setTimeout(function() {
      if (pinEntry === ADMIN_PIN) {
        isAdmin = true;
        closePin();
        applyAdminState();
      } else {
        document.getElementById('pin-error').textContent = 'PIN incorrecto';
        pinEntry = '';
        updatePinDots();
      }
    }, 150);
  }
}

function pinDel() { pinEntry = pinEntry.slice(0, -1); updatePinDots(); }

function updatePinDots() {
  for (var i = 0; i < 4; i++) {
    var dot = document.getElementById('d' + i);
    if (i < pinEntry.length) dot.classList.add('filled');
    else dot.classList.remove('filled');
  }
}

function lockAdmin() { isAdmin = false; applyAdminState(); }

function applyAdminState() {
  document.getElementById('admin-badge').classList.toggle('visible', isAdmin);
  document.getElementById('readonly-banner').style.display = isAdmin ? 'none' : 'block';
  document.getElementById('reset-btn').style.display = isAdmin ? 'block' : 'none';
  document.getElementById('date-arrival').disabled = !isAdmin;
  document.getElementById('date-departure').disabled = !isAdmin;
}

// ── TASK VISUAL ──────────────────────────────────────────
function applyTaskStyle(el, isChecked) {
  var cb = el.querySelector('.task-cb');
  var txt = el.querySelector('.task-text');
  var note = el.querySelector('.task-note');
  if (isChecked) {
    el.style.background = '#ffffff';
    cb.style.background = '#1a1a1a';
    cb.style.border = '1.5px solid #1a1a1a';
    cb.innerHTML = '<svg viewBox="0 0 10 8" width="10" height="10" fill="none" stroke="white" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="1,4 4,7 9,1"/></svg>';
    txt.style.color = '#1a1a1a';
    txt.style.fontWeight = '400';
    if (note) note.style.color = '#d4622a';
  } else {
    el.style.background = '#f9f8f6';
    cb.style.background = '#ffffff';
    cb.style.border = '1.5px solid #d4d1cb';
    cb.innerHTML = '';
    txt.style.color = '#d4d1cb';
    txt.style.fontWeight = '300';
    if (note) note.style.color = '#d4d1cb';
  }
}

function handleTaskClick(id, e) {
  e.stopPropagation();
  if (!isAdmin) return;
  checked[id] = !checked[id];
  var el = document.getElementById('t-' + id);
  if (el) applyTaskStyle(el, checked[id]);
  refreshCount(parseInt(id.split('-')[0]));
  updateProgress();
  saveToFirebase();
}

// ── DATE INPUT ───────────────────────────────────────────
function onDateInput(which) {
  if (!isAdmin) return;
  var other = which === 'arrival' ? 'departure' : 'arrival';
  var val = document.getElementById('date-' + which).value;
  if (val) {
    document.getElementById('date-' + other).value = '';
    document.getElementById('card-' + other).classList.add('dimmed');
    document.getElementById('card-' + which).classList.remove('dimmed');
    mode = which;
  } else {
    document.getElementById('card-arrival').classList.remove('dimmed');
    document.getElementById('card-departure').classList.remove('dimmed');
    mode = null;
  }
  updateBanners();
  render();
  saveToFirebase();
}

// ── DATES & BANNERS ──────────────────────────────────────
function dayDiff(dateStr) {
  var today = new Date(); today.setHours(0,0,0,0);
  return Math.round((new Date(dateStr + 'T00:00:00') - today) / 86400000);
}

function relLabel(diff) {
  var u = UI[lang];
  if (diff === 0) return u.today;
  if (diff === 1) return u.tomorrow;
  if (diff === -1) return u.yesterday;
  if (diff > 1) return u.inDays(diff);
  return u.daysAgo(Math.abs(diff));
}

function updateBanners() {
  var u = UI[lang];
  var av = document.getElementById('date-arrival').value;
  var dv = document.getElementById('date-departure').value;
  var bA = document.getElementById('banner-arrival');
  var bD = document.getElementById('banner-departure');
  if (av) {
    document.getElementById('banner-arrival-date').textContent = u.fmt(new Date(av + 'T00:00:00'));
    document.getElementById('banner-arrival-days').textContent = relLabel(dayDiff(av));
    bA.classList.add('visible'); bD.classList.remove('visible');
  } else if (dv) {
    document.getElementById('banner-departure-date').textContent = u.fmt(new Date(dv + 'T00:00:00'));
    document.getElementById('banner-departure-days').textContent = relLabel(dayDiff(dv));
    bD.classList.add('visible'); bA.classList.remove('visible');
  } else {
    bA.classList.remove('visible'); bD.classList.remove('visible');
  }
}

// ── RESET ────────────────────────────────────────────────
function resetAll() {
  if (!isAdmin) return;
  checked = {};
  document.querySelectorAll('.task').forEach(function(el) { applyTaskStyle(el, false); });
  SECTIONS[lang].forEach(function(_, si) { refreshCount(si); });
  updateProgress();
  saveToFirebase();
}

// ── SECTIONS & TASKS ─────────────────────────────────────
function toggleCollapse(si) {
  collapsed[si] = !collapsed[si];
  var sec = document.getElementById('section-' + si);
  if (sec) sec.classList.toggle('collapsed', !!collapsed[si]);
}

function refreshCount(si) {
  var sec = SECTIONS[lang][si];
  if (!sec) return;
  var total = 0, done = 0;
  for (var pi = 0; pi < sec.phases.length; pi++)
    for (var ti = 0; ti < sec.phases[pi].tasks.length; ti++) {
      total++;
      if (checked[si + '-' + pi + '-' + ti]) done++;
    }
  var el = document.getElementById('sc-' + si);
  if (el) el.textContent = done + ' / ' + total;
}

function updateProgress() {
  var sections = SECTIONS[lang];
  var total = 0, done = 0;
  for (var si = 0; si < sections.length; si++) {
    if (mode !== null && sections[si].mode !== mode) continue;
    for (var pi = 0; pi < sections[si].phases.length; pi++)
      for (var ti = 0; ti < sections[si].phases[pi].tasks.length; ti++) {
        total++;
        if (checked[si + '-' + pi + '-' + ti]) done++;
      }
  }
  document.getElementById('pf').style.width = (total ? Math.round(done / total * 100) : 0) + '%';
  document.getElementById('pl').textContent = done + ' / ' + total;
}

function setLang(l) {
  lang = l;
  document.getElementById('btn-de').classList.toggle('active', l === 'de');
  document.getElementById('btn-es').classList.toggle('active', l === 'es');
  var u = UI[l];
  document.getElementById('wordmark').textContent = u.wordmark;
  document.getElementById('reset-btn').textContent = u.reset;
  document.getElementById('lbl-arrival').textContent = u.lblArrival;
  document.getElementById('lbl-departure').textContent = u.lblDeparture;
  document.getElementById('banner-arrival-label').textContent = u.lblArrival;
  document.getElementById('banner-departure-label').textContent = u.lblDeparture;
  document.getElementById('readonly-banner').textContent = u.readonly;
  updateBanners();
  render();
}

function render() {
  var currentMode = mode;
  var sections = SECTIONS[lang];
  var container = document.getElementById('content');
  var bA = document.getElementById('banner-arrival');
  var bD = document.getElementById('banner-departure');
  container.innerHTML = '';
  container.appendChild(bA);
  container.appendChild(bD);

  for (var si = 0; si < sections.length; si++) {
    var sec = sections[si];
    if (currentMode !== null && sec.mode !== currentMode) continue;

    var total = 0, done = 0;
    for (var pi = 0; pi < sec.phases.length; pi++)
      for (var ti = 0; ti < sec.phases[pi].tasks.length; ti++) {
        total++;
        if (checked[si + '-' + pi + '-' + ti]) done++;
      }

    var section = document.createElement('div');
    section.className = 'section' + (collapsed[si] ? ' collapsed' : '');
    section.id = 'section-' + si;

    var header = document.createElement('div');
    header.className = 'section-header';
    header.innerHTML =
      '<div class="section-left"><span class="section-title">' + sec.title + '</span>' +
      '<span class="section-count" id="sc-' + si + '">' + done + ' / ' + total + '</span></div>' +
      '<div class="collapse-icon"><svg width="12" height="12" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="2,4 6,8 10,4"/></svg></div>';
    (function(idx) { header.addEventListener('click', function() { toggleCollapse(idx); }); })(si);
    section.appendChild(header);

    var body = document.createElement('div');
    body.className = 'section-body';

    for (var pi2 = 0; pi2 < sec.phases.length; pi2++) {
      var ph = sec.phases[pi2];
      if (ph.label) {
        var lbl = document.createElement('div');
        lbl.className = 'phase-label';
        lbl.textContent = ph.label;
        body.appendChild(lbl);
      }
      for (var ti2 = 0; ti2 < ph.tasks.length; ti2++) {
        var task = ph.tasks[ti2];
        var id = si + '-' + pi2 + '-' + ti2;
        var el = document.createElement('div');
        el.className = 'task';
        el.id = 't-' + id;
        el.innerHTML =
          '<div class="task-cb"></div>' +
          '<div class="task-body"><div class="task-text">' + task.text + '</div>' +
          (task.note ? '<span class="task-note">' + task.note + '</span>' : '') + '</div>';
        applyTaskStyle(el, !!checked[id]);
        (function(taskId) {
          el.addEventListener('click', function(e) { handleTaskClick(taskId, e); });
        })(id);
        body.appendChild(el);
      }
    }
    section.appendChild(body);
    container.appendChild(section);
  }
  updateProgress();
}
